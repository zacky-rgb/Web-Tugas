<!DOCTYPE html>
<html>
<head>
  <title>Scrapbook IPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
    }

    header {
      padding: 20px;
      text-align: center;
      font-size: 24px;
      border-bottom: 1px solid #222;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .section {
      margin-bottom: 40px;
      animation: fadeIn 1s ease;
    }

    h2 {
      border-left: 4px solid #fff;
      padding-left: 10px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 10px;
      margin-top: 10px;
      transition: 0.3s;
    }

    .card:hover {
      background: #1a1a1a;
      transform: translateY(-5px);
    }

    iframe {
      width: 100%;
      height: 300px;
      border-radius: 10px;
    }

    @keyframes fadeIn {
      from {opacity: 0; transform: translateY(20px);}
      to {opacity: 1; transform: translateY(0);}
    }
  </style>
</head>

<body>

<header>
  Scrapbook IPA 🚀
</header>

<div class="container">

  <div class="section">
    <h2>Identitas</h2>
    <div class="card">
      <p>Isi nama kelompok di sini</p>
    </div>
  </div>

  <div class="section">
    <h2>Rotasi & Revolusi</h2>
    <div class="card">
      <p>Isi materi kamu di sini</p>
    </div>
  </div>

  <div class="section">
    <h2>Artemis II</h2>
    <div class="card">
      <p>Isi penjelasan di sini</p>
    </div>
  </div>

  <div class="section">
    <h2>Video</h2>
    <iframe src="https://www.youtube.com/embed/3IL25IDJ3HA"></iframe>
  </div>

</div>

</body>
</html>
