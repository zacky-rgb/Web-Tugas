<!DOCTYPE html>
<html>
<head>
  <title>Scrapbook IPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle at top, #111, #000);
      color: white;
      overflow-x: hidden;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 80px 20px;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      margin-bottom: 60px;
      letter-spacing: 1px;
    }

    .section {
      margin-bottom: 60px;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      font-weight: 500;
      margin-bottom: 10px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      padding: 25px;
      border-radius: 15px;
      backdrop-filter: blur(15px);
      transition: 0.3s;
    }

    .card:hover {
      transform: translateY(-8px) scale(1.02);
      background: rgba(255,255,255,0.08);
    }

    iframe {
      width: 100%;
      height: 280px;
      border-radius: 10px;
      margin-top: 10px;
    }

    /* glowing effect */
    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 15px;
      padding: 1px;
      background: linear-gradient(45deg, #3b82f6, transparent);
      -webkit-mask:
        linear-gradient(#000 0 0) content-box,
        linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
    }

  </style>
</head>

<body>

<div class="container">

  <h1>🚀 Scrapbook IPA</h1>

  <div class="section">
    <h2>Identitas</h2>
    <div class="card">
      <p>Nama 1 | Kelas | Absen</p>
      <p>Nama 2 | Kelas | Absen</p>
      <p>dst...</p>
    </div>
  </div>

  <div class="section">
    <h2>Rotasi & Revolusi</h2>
    <div class="card">
      <p>Rotasi bumi menyebabkan siang dan malam.</p>
      <p>Revolusi bumi menyebabkan pergantian musim.</p>
    </div>
  </div>

  <div class="section">
    <h2>Artemis II</h2>
    <div class="card">
      <p>Misi manusia mengelilingi bulan.</p>
    </div>
  </div>

  <div class="section">
    <h2>Video</h2>
    <div class="card">
      <iframe src="https://www.youtube.com/embed/3IL25IDJ3HA"></iframe>
    </div>
  </div>

</div>

<script>
  const sections = document.querySelectorAll('.section');

  window.addEventListener('scroll', () => {
    sections.forEach(sec => {
      const top = sec.getBoundingClientRect().top;
      if(top < window.innerHeight - 100){
        sec.classList.add('show');
      }
    });
  });
</script>

</body>
</html>
