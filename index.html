<!DOCTYPE html>
<html>
<head>
  <title>Scrapbook IPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #000;
      color: white;
      text-align: center;
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {
      font-size: 36px;
      margin-bottom: 40px;
    }

    .section {
      margin-bottom: 50px;
      opacity: 0;
      transform: translateY(20px);
      transition: 0.6s;
    }

    .show {
      opacity: 1;
      transform: translateY(0);
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      margin-top: 15px;
    }

    iframe {
      width: 100%;
      height: 250px;
      border-radius: 10px;
      margin-top: 10px;
    }
  </style>
</head>

<body>

<div class="container">

  <h1>Scrapbook IPA 🚀</h1>

  <div class="section">
    <h2>Identitas</h2>
    <div class="card">
      <p>Nama 1 | Kelas | Absen</p>
      <p>Nama 2 | Kelas | Absen</p>
      <p>dst...</p>
    </div>
  </div>

  <div class="section">
    <h2>Rotasi & Revolusi</h2>
    <div class="card">
      <p>Rotasi bumi menyebabkan siang dan malam.</p>
      <p>Revolusi bumi menyebabkan pergantian musim.</p>
    </div>
  </div>

  <div class="section">
    <h2>Artemis II</h2>
    <div class="card">
      <p>Misi manusia mengelilingi bulan.</p>
    </div>
  </div>

  <div class="section">
    <h2>Video</h2>
    <iframe src="https://www.youtube.com/embed/3IL25IDJ3HA"></iframe>
  </div>

</div>

<script>
  const sections = document.querySelectorAll('.section');

  window.addEventListener('scroll', () => {
    sections.forEach(sec => {
      const top = sec.getBoundingClientRect().top;
      if(top < window.innerHeight - 50){
        sec.classList.add('show');
      }
    });
  });
</script>

</body>
</html>
