<!DOCTYPE html>
<html>
<head>
  <title>Scrapbook IPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: black;
      color: white;
      overflow-x: hidden;
    }

    /* 🌌 bintang */
    .stars {
      position: fixed;
      width: 100%;
      height: 100%;
      background: url("https://www.transparenttextures.com/patterns/stardust.png");
      animation: moveStars 60s linear infinite;
      z-index: -2;
    }

    @keyframes moveStars {
      from {background-position: 0 0;}
      to {background-position: 1000px 1000px;}
    }

    /* 🌙 bulan */
    .moon {
      position: fixed;
      top: 50px;
      right: 50px;
      width: 120px;
      height: 120px;
      background: radial-gradient(circle, #fff, #ccc);
      border-radius: 50%;
      box-shadow: 0 0 40px white;
      animation: float 6s ease-in-out infinite;
      z-index: -1;
    }

    @keyframes float {
      0% { transform: translateY(0);}
      50% { transform: translateY(-20px);}
      100% { transform: translateY(0);}
    }

    .container {
      max-width: 700px;
      margin: auto;
      padding: 100px 20px;
      text-align: center;
    }

    h1 {
      font-size: 34px;
      margin-bottom: 80px;
    }

    .section {
      margin-bottom: 80px;
      opacity: 0;
      transform: translateY(40px);
      transition: 0.8s;
    }

    .section.show {
      opacity: 1;
      transform: translateY(0);
    }

    h2 {
      color: #aaa;
      font-weight: 400;
    }

    iframe {
      width: 100%;
      height: 250px;
      border: none;
      margin-top: 10px;
    }

  </style>
</head>

<body>

<div class="stars"></div>
<div class="moon"></div>

<div class="container">

  <h1>🚀 Scrapbook IPA</h1>

  <div class="section">
    <h2>Identitas</h2>
    <p>Nama 1 | Kelas | Absen</p>
    <p>Nama 2 | Kelas | Absen</p>
  </div>

  <div class="section">
    <h2>Rotasi & Revolusi</h2>
    <p>Rotasi bumi menyebabkan siang dan malam.</p>
    <p>Revolusi bumi menyebabkan pergantian musim.</p>
  </div>

  <div class="section">
    <h2>Artemis II</h2>
    <p>Misi manusia mengelilingi bulan.</p>
  </div>

  <div class="section">
    <h2>Video</h2>
    <iframe src="https://www.youtube.com/embed/3IL25IDJ3HA"></iframe>
  </div>

</div>

<script>
  const sections = document.querySelectorAll('.section');

  window.addEventListener('scroll', () => {
    sections.forEach(sec => {
      const top = sec.getBoundingClientRect().top;
      if(top < window.innerHeight - 100){
        sec.classList.add('show');
      }
    });
  });
</script>

</body>
</html>
