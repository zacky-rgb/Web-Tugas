<!DOCTYPE html>
<html>
<head>
  <title>Scrapbook IPA</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;500;700&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0a0a0a;
      color: #e5e5e5;
    }

    header {
      text-align: center;
      padding: 40px 20px;
      font-size: 32px;
      font-weight: 700;
    }

    .container {
      max-width: 800px;
      margin: auto;
      padding: 20px;
    }

    .section {
      margin-bottom: 40px;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeIn 1s ease forwards;
    }

    h2 {
      font-weight: 500;
      border-bottom: 1px solid #333;
      padding-bottom: 5px;
      margin-bottom: 10px;
    }

    .card {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
    }

    .card:hover {
      background: #1a1a1a;
      transform: translateY(-5px);
    }

    iframe {
      width: 100%;
      height: 300px;
      border-radius: 10px;
      margin-top: 10px;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>

<body>

<header>
  Scrapbook IPA 🚀
</header>

<div class="container">

  <div class="section">
    <h2>Identitas Kelompok</h2>
    <div class="card">
      <p>Nama 1 | Kelas | Absen</p>
      <p>Nama 2 | Kelas | Absen</p>
      <p>dst...</p>
    </div>
  </div>

  <div class="section">
    <h2>Rotasi & Revolusi</h2>
    <div class="card">
      <p>Rotasi bumi menyebabkan siang dan malam.</p>
      <p>Revolusi bumi menyebabkan pergantian musim.</p>
    </div>
  </div>

  <div class="section">
    <h2>Artemis II</h2>
    <div class="card">
      <p>Misi NASA untuk mengelilingi bulan dengan awak manusia.</p>
    </div>
  </div>

  <div class="section">
    <h2>Video</h2>
    <iframe src="https://www.youtube.com/embed/3IL25IDJ3HA"></iframe>
  </div>

</div>

</body>
</html>
